<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Taller</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css?v=25" />
</head>
<body>
  <!-- LOGIN -->
  <section id="loginScreen" class="login-screen hidden">
    <div class="login-card">
      <div class="logo-circle" id="loginLogo"></div>
      <h1 id="loginTitle" class="brand-name">Taller</h1>
      <p class="muted">Acceso del técnico</p>
      <div class="pwd-wrap">
        <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password" />
        <button type="button" class="pwd-eye" data-pwd-toggle aria-label="Mostrar contraseña">
          <svg viewBox="0 0 24 24" class="ico eye-on"><path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
          <svg viewBox="0 0 24 24" class="ico eye-off"><path d="M2 4.3L3.3 3l18 18-1.3 1.3-3-3A12 12 0 0 1 12 20C5 20 1 13 1 13a17 17 0 0 1 4.4-5.1L2 4.3zM12 8a5 5 0 0 1 5 5c0 .7-.1 1.3-.4 1.9l-2-2A3 3 0 0 0 12 10c-.3 0-.6 0-.9.1l-2-2C9.7 8 10.8 8 12 8zm0-3c7 0 11 7 11 7a17 17 0 0 1-3.2 4l-1.4-1.4A14 14 0 0 0 21 13s-3.5-6-9-6c-.8 0-1.5.1-2.2.3L8.3 5.9C9.5 5.3 10.7 5 12 5z"/></svg>
        </button>
      </div>
      <button class="btn-primary" id="loginBtn">Entrar</button>
      <button type="button" id="forgotBtn" class="forgot-link">¿Olvidaste tu contraseña?</button>
      <p id="loginError" class="err hidden">Contraseña incorrecta</p>
    </div>
    <footer class="credit">
      <svg viewBox="0 0 24 24" class="crown"><path d="M3 18h18v2H3zm0-2l2-9 4 4 3-7 3 7 4-4 2 9H3z"/></svg>
      <span>Creado por <b>Edrian Cruz Down</b></span>
    </footer>
  </section>

  <!-- APP -->
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="topbar-main">
        <div class="brand-block">
          <div class="brand-row">
            <div class="brand-logo" id="appLogo"></div>
            <h1 id="appTitle" class="brand-name">Taller</h1>
          </div>
          <div class="creator-row">
            <div class="creator-left">
              <svg viewBox="0 0 24 24" class="crown"><path d="M3 18h18v2H3zm0-2l2-9 4 4 3-7 3 7 4-4 2 9H3z"/></svg>
              <span>Creado por <b>Edrian Cruz Down</b></span>
            </div>
            <div class="creator-right" id="creatorContacts"></div>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="logoutBtn" title="Salir">
            <svg viewBox="0 0 24 24" class="ico"><path d="M10 17l-1.4-1.4 2.6-2.6H3v-2h8.2L8.6 8.4 10 7l5 5-5 5zm10 2H12v-2h8V5h-8V3h8a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main id="view"></main>

    <nav class="tabbar">
      <button class="tab active" data-view="dashboard">
        <svg viewBox="0 0 24 24" class="ico"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        <span>Inicio</span>
      </button>
      <button class="tab" data-view="repairs">
        <svg viewBox="0 0 24 24" class="ico"><path d="M22 7l-5-5-3 3 5 5 3-3zM2 22l8.5-8.5 2.5 2.5L4.5 24.5 2 22zm10-10l5 5L7 27H2v-5l10-10z"/></svg>
        <span>Reparaciones</span>
      </button>
      <button class="tab" data-view="search" aria-label="Buscar">
        <svg viewBox="0 0 24 24" class="ico"><path d="M21 20l-5.6-5.6a8 8 0 1 0-1.4 1.4L19.6 21.4 21 20zM4 10a6 6 0 1 1 12 0 6 6 0 0 1-12 0z"/></svg>
        <span>Buscar</span>
      </button>
      <span class="tab tab-spacer" aria-hidden="true"></span>
      <button class="tab fab-tab" data-view="chooser" aria-label="Agregar">
        <svg viewBox="0 0 24 24" class="ico"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
      <button class="tab" data-view="summary">
        <svg viewBox="0 0 24 24" class="ico"><path d="M5 9.2h3v9H5v-9zm5.5-5h3v14h-3v-14zM16 13h3v5.2h-3V13z"/></svg>
        <span>Resumen</span>
      </button>
      <button class="tab" data-view="sales">
        <svg viewBox="0 0 24 24" class="ico"><path d="M7 18a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM7.2 14.6l.9-1.6h7.5a2 2 0 0 0 1.8-1.1l3.2-6.1L18.8 5l-3.2 6H8.5L4.3 2H1v2h2l3.6 7.6-1.4 2.5C4.5 15.4 5.4 17 6.9 17H19v-2H7.4l-.2-.4z"/></svg>
        <span>Comp/Vent</span>
      </button>
      <button class="tab" data-view="admin">
        <svg viewBox="0 0 24 24" class="ico"><path d="M19.4 13a7.5 7.5 0 0 0 0-2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7.5 7.5 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/></svg>
        <span>Admin</span>
      </button>
    </nav>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">
        <svg viewBox="0 0 24 24" class="ico"><path d="M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/></svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/db.js?v=25"></script>
  <script src="js/sync.js?v=25"></script>
  <script src="js/auth.js?v=25"></script>
  <script src="js/ui.js?v=25"></script>
  <script src="js/views.js?v=25"></script>
  <script src="js/app.js?v=25"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          reg.update();
          if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage('SKIP_WAITING');
              }
            });
          });
        }).catch(()=>{});
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return; reloaded = true; window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
